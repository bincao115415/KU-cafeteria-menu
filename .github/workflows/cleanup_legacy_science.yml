name: One-off · archive legacy science rows

on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install httpx
      - env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/archive_legacy_science.py
